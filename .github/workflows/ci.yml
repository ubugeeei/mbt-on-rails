name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  moonbit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Show toolchain versions
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Check formatting and interfaces
        run: |
          moon info
          moon fmt
          git diff --exit-code

      - name: Build default target
        run: moon build

      - name: Build JavaScript target
        run: moon build --target js

      - name: Run checks
        run: moon check

      - name: Run tests
        run: moon test
